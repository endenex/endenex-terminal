name: Weekly scrap price update

on:
  schedule:
    # Every Monday at 06:00 UTC. FRED PPI scrap publishes monthly (~mid-
    # month), so a weekly run is a no-op three weeks out of four. The
    # script's UNIQUE constraint on scrap_price_benchmarks makes re-runs
    # idempotent.
    - cron: '0 6 * * 1'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ingestion/requirements.txt

      - name: Install dependencies
        run: pip install -r ingestion/requirements.txt

      - name: FRED PPI movement update
        working-directory: ingestion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # FRED API key — script uses api.stlouisfed.org (reliable) when
          # set, falls back to the flaky fred.stlouisfed.org graph CSV
          # otherwise. Free key at https://fredaccount.stlouisfed.org/apikey
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python weekly_scrap_price_update.py

      - name: Public press scan (Argus / AMM / RecyclingToday / LetsRecycle)
        # Script no-ops gracefully if ANTHROPIC_API_KEY is unset.
        working-directory: ingestion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python weekly_press_scrap_prices.py
