name: Daily Pipeline

# One coherent daily run that refreshes everything operators expect to be live:
#
#   Step 1.  Airtable Watch sync          → watch_events
#   Step 2.  EEG-expiry promoter (DE)     → repowering_projects
#   Step 3.  REPD planning promoter (UK)  → repowering_projects
#   Step 4.  Airtable → repowering        → repowering_projects   (depends on Step 1)
#   Step 5.  Trade-press RSS monitor      → watch_events
#   Step 6.  Asset signals classifier     → asset_signals          (depends on Steps 2-4)
#   Step 7.  Fetch ECB FX rates           → fx_rates                (free, no key)
#   Step 8.  Fetch LME / COMEX scrap      → commodity_prices        (yfinance, uses Step 7 FX)
#   Step 9.  Compute DCI publications     → dci_publications        (uses Steps 7-8)
#   Step 10. Compute NRO estimates        → nro_estimates           (uses Steps 7-8)
#   Step 11. USWTDB sync                  → us_wind_assets          (USGS, weekly cadence sufficient)
#   Step 12. BLM ROW polygons sync        → blm_row_polygons        (state-office ArcGIS)
#   Step 13. Federal-land flag compute    → us_wind_assets.is_federal_land  (depends on 11+12)
#   Step 14. Companies House iXBRL sync   → ch_filings + ch_provisions      (UK SPVs / operators)
#
# Each step writes to ingestion_runs telemetry. The Coverage overlay in the
# Terminal shows the daily run health.
#
# Schedule: 06:00 UTC daily = 06:00 GMT / 07:00 BST.
# Picked to land BEFORE London business hours so figures are fresh when teams
# arrive at their desks.
#
# Note: ECB publishes FX at ~16:00 CET (15:00 UTC). The 06:00 UTC run picks up
# YESTERDAY's ECB rates (today's aren't out yet). That's the standard
# institutional convention — IFRS uses prior-day close anyway.
#
# `continue-on-error: true` on every step ensures one failure (e.g. a flaky
# trade-press RSS feed) doesn't block downstream steps.

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Manual trigger from the Actions tab — useful for ad-hoc backfills.

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ingestion/requirements.txt

      - name: Install dependencies
        run: pip install -r ingestion/requirements.txt

      # ── Step 1 ── Airtable curated intelligence
      - name: 1 · Airtable Watch sync
        working-directory: ingestion
        env:
          AIRTABLE_TOKEN:            ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE_ID:          ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_TABLE_ID:         ${{ secrets.AIRTABLE_TABLE_ID }}
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python sync_airtable_watch.py
        continue-on-error: true

      # ── Step 2 ── EEG-expiry promoter (DE)
      - name: 2 · Promote EEG-expiring DE assets
        working-directory: ingestion
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python promote_eeg_repowering.py
        continue-on-error: true

      # ── Step 3 ── REPD planning status (UK)
      - name: 3 · Promote REPD planning-status
        working-directory: ingestion
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python promote_repd_repowering.py
        continue-on-error: true

      # ── Step 4 ── Airtable → repowering (depends on Step 1)
      - name: 4 · Promote Airtable Watch → repowering_projects
        working-directory: ingestion
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python promote_airtable_repowering.py
        continue-on-error: true

      # ── Step 5 ── Trade-press RSS monitor
      - name: 5 · Trade-press RSS
        working-directory: ingestion
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python ingest_trade_press.py --days 14
        continue-on-error: true

      # ── Step 6 ── Asset signals (depends on Steps 2-4)
      - name: 6 · Recompute asset_signals
        working-directory: ingestion
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python compute_asset_signals.py
        continue-on-error: true

      # ── Step 7 ── ECB FX rates (free, no key)
      - name: 7 · Fetch ECB FX rates
        working-directory: ingestion
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python fetch_fx_rates.py
        continue-on-error: true

      # ── Step 8 ── LME / COMEX scrap-basis price refresh (uses Step 7 FX)
      - name: 8 · Fetch LME/COMEX scrap prices
        working-directory: ingestion
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python fetch_lme_scrap_prices.py
        continue-on-error: true

      # ── Step 9 ── DCI publications (v1.1, uses fresh prices from Step 8)
      - name: 9 · Compute DCI publications
        working-directory: ingestion
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python compute_dci.py
        continue-on-error: true

      # ── Step 10 ── NRO estimates (v1.1, uses fresh prices from Step 8)
      - name: 10 · Compute NRO estimates
        working-directory: ingestion
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python compute_nro.py
        continue-on-error: true

      # ── Step 11 ── USGS USWTDB → us_wind_assets (~75k turbines)
      - name: 11 · USWTDB sync
        working-directory: ingestion
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python sync_uswtdb.py
        continue-on-error: true

      # ── Step 12 ── BLM state-office ROW polygons → blm_row_polygons
      - name: 12 · BLM ROW polygons sync
        working-directory: ingestion
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python sync_blm_row_polygons.py
        continue-on-error: true

      # ── Step 13 ── Federal-land flag spatial join (depends on 11 + 12)
      - name: 13 · Compute federal-land flags
        working-directory: ingestion
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python compute_federal_land_flags.py
        continue-on-error: true

      # ── Step 14 ── Companies House iXBRL → ch_filings + ch_provisions
      # UK operator/SPV provision balances scraped from filed accounts.
      # Free CH API; rate-limited at 600 req / 5 min — script paces 0.6s/req.
      - name: 14 · Companies House iXBRL sync
        working-directory: ingestion
        env:
          CH_API_KEY:                ${{ secrets.CH_API_KEY }}
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python sync_companies_house_ixbrl.py
        continue-on-error: true
