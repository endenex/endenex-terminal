name: Ingest MaStR (Germany)

on:
  schedule:
    # Runs on the 1st of every month at 05:00 UTC
    # MaStR is updated daily — monthly refresh is sufficient for Phase 1
    - cron: '0 5 1 * *'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    # MaStR bulk download is large — allow up to 90 minutes
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ingestion/requirements.txt

      - name: Install dependencies
        run: pip install -r ingestion/requirements.txt

      - name: Run MaStR ingestion
        working-directory: ingestion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python ingest_mastr.py
