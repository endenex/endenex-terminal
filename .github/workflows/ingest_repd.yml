name: Ingest REPD (UK)

on:
  schedule:
    # Runs on the 2nd day of January, April, July, October at 06:00 UTC
    # (offset from quarter start to allow REPD to publish the latest release)
    - cron: '0 6 2 1,4,7,10 *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions tab

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ingestion/requirements.txt

      - name: Install dependencies
        run: pip install -r ingestion/requirements.txt

      - name: Run REPD ingestion
        working-directory: ingestion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python ingest_repd.py
