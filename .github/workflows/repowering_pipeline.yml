name: Repowering pipeline ingestion

on:
  schedule:
    # Mondays 04:00 UTC for Phase 1 source pulls (ERCOT, CAISO, RTE).
    # Tuesdays 04:00 UTC for Phase 2 (MITECO, Terna).
    # Wednesdays 04:00 UTC for Phase 3 (SEC EDGAR + LSE RNS).
    # Thursdays 04:00 UTC for completion-check + developer-enrichment.
    - cron: '0 4 * * 1'    # Mon — Phase 1
    - cron: '0 4 * * 2'    # Tue — Phase 2
    - cron: '0 4 * * 3'    # Wed — Phase 3
    - cron: '0 4 * * 4'    # Thu — orchestrators
  workflow_dispatch:

jobs:
  phase-1-iso-queues:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 4 * * 1'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ingestion/requirements.txt
      - run: pip install -r ingestion/requirements.txt openpyxl
      # ERCOT disabled in CI: ercot.com is fronted by Imperva WAF and
      # returns 403 to all unauthenticated downloads. Trigger
      # ingestion/repowering/ercot_ginr.py manually with --url if you
      # can host the XLS somewhere accessible. Texas coverage will
      # come from EIA Form 860 with ~12-month lag.
      - name: CAISO Queue (strict repowering filter)
        working-directory: ingestion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m repowering.caiso_queue
        continue-on-error: true
      - name: France EIA (consultations-publiques + LLM)
        working-directory: ingestion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m repowering.france_eia
        continue-on-error: true
      # rte_france.py: deprecated (commune-aggregated dataset, no
      # project-level data). Replaced by france_eia.py above. Kept in
      # repo for reference; not invoked.
      # AEMO: same — requires monthly URL refresh, trigger manually.

  phase-2-eu-fragmented:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 4 * * 2'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ingestion/requirements.txt
      - run: pip install -r ingestion/requirements.txt openpyxl
      - name: Spain BOE (national gazette + LLM)
        working-directory: ingestion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m repowering.spain_boe
        continue-on-error: true
      # miteco_spain.py: deprecated (URL pattern dead, 404). Replaced
      # by spain_boe.py above. Kept in repo for reference; not invoked.
      # Terna: requires monthly URL refresh, trigger manually when
      # the Italian regulator publishes a new XLSX.

  phase-3-corporate-filings:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 4 * * 3'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ingestion/requirements.txt
      - run: pip install -r ingestion/requirements.txt
      - name: SEC EDGAR + LSE RNS
        working-directory: ingestion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m repowering.sec_edgar

  orchestrators:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 4 * * 4'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ingestion/requirements.txt
      - run: pip install -r ingestion/requirements.txt
      - name: Completion check (ongoing → completed_at)
        working-directory: ingestion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python -m repowering.check_completions
        continue-on-error: true
      - name: Developer enrichment (NULL developer → matched)
        working-directory: ingestion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python -m repowering.enrich_developers
        continue-on-error: true
