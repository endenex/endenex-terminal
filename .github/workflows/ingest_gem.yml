name: Ingest GEM Wind Power Tracker (Spain)

on:
  schedule:
    # Quarterly — GEM file must be manually updated in ingestion/data/ before this runs
    - cron: '0 6 5 1,4,7,10 *'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ingestion/requirements.txt

      - name: Install dependencies
        run: pip install -r ingestion/requirements.txt

      - name: Check GEM file exists
        run: |
          if [ ! -f ingestion/data/gem_wind_tracker.xlsx ]; then
            echo "ERROR: ingestion/data/gem_wind_tracker.xlsx not found."
            echo "Download from https://globalenergymonitor.org/projects/global-wind-power-tracker/"
            echo "and commit the file before running this workflow."
            exit 1
          fi

      - name: Run GEM ingestion
        working-directory: ingestion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python ingest_gem.py
